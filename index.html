<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Cams</title>
  <meta name="description" content="Browse top live cam rooms. Crimson Velvet theme." />
  <meta name="robots" content="index, follow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:  #0f0608;
      --s1:  #1c0a10;
      --s2:  #220e14;
      --br:  #481018;
      --ac:  #990f35;
      --al:  #bc2850;
      --ad:  #500818;
      --t:   #f5c8d5;
      --tm:  #a05870;
      --td:  #683048;
      --live: #e0403a;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--t); font-family: var(--font); min-height: 100vh; line-height: 1.5; }

    header { border-bottom: 1px solid var(--br); padding: 0 20px; position: sticky; top: 0; z-index: 100; background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(14px); }
    .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; height: 52px; gap: 12px; }
    .logo { font-size: 17px; font-weight: 700; color: var(--al); letter-spacing: -0.3px; text-decoration: none; flex-shrink: 0; }
    .theme-tag { font-size: 11px; color: var(--tm); background: var(--s1); border: 1px solid var(--br); padding: 3px 10px; border-radius: 20px; }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; color: var(--live); letter-spacing: 0.8px; flex-shrink: 0; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }
    .room-count { font-size: 12px; color: var(--tm); flex-shrink: 0; }
    .header-spacer { flex: 1; }
    .back-link { font-size: 11px; color: var(--tm); text-decoration: none; border: 1px solid var(--br); padding: 3px 10px; border-radius: 6px; transition: color .15s, border-color .15s; }
    .back-link:hover { color: var(--al); border-color: var(--ac); }

    main { max-width: 1400px; margin: 0 auto; padding: 22px 18px 60px; }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--td); margin-bottom: 12px; }

    .tags-section { margin-bottom: 28px; }
    .tags-scroll { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--br); font-size: 11px; color: var(--tm); background: var(--s1); transition: border-color .15s, color .15s, background .15s; cursor: pointer; white-space: nowrap; }
    .tag:hover, .tag.active { border-color: var(--ac); color: var(--al); background: var(--ad); }

    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }

    .room-card { background: var(--s1); border: 1px solid var(--br); border-radius: var(--radius); overflow: hidden; transition: border-color .15s, transform .15s; position: relative; }
    .room-card:hover { border-color: var(--ac); transform: translateY(-2px); }

    .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--s2); cursor: pointer; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .22s; }
    .room-card:hover .thumb-wrap img { transform: scale(1.04); }
    .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.38); opacity: 0; transition: opacity .15s; }
    .thumb-wrap:hover .play-btn { opacity: 1; }
    .play-icon { width: 42px; height: 42px; border-radius: 50%; background: color-mix(in srgb, var(--ac) 88%, #000); display: flex; align-items: center; justify-content: center; }
    .play-icon svg { width: 16px; height: 16px; fill: #fff; margin-left: 2px; }
    .card-rank { position: absolute; top: 7px; left: 7px; background: rgba(0,0,0,.72); color: var(--tm); font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
    .card-viewers { position: absolute; top: 7px; right: 7px; background: rgba(224,64,58,.85); color: #fff; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 3px; }

    .embed-wrap { position: relative; aspect-ratio: 16/9; background: #000; }
    .embed-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .close-embed { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,.78); border: 1px solid var(--br); color: var(--tm); border-radius: 4px; width: 24px; height: 24px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; z-index: 5; }
    .close-embed:hover { color: var(--t); }

    .card-info { padding: 9px 11px 11px; }
    .card-name { font-size: 12px; font-weight: 600; color: var(--t); text-decoration: none; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .card-name:hover { color: var(--al); }
    .card-subject { font-size: 11px; color: var(--tm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 7px; line-height: 1.4; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .card-tag { font-size: 10px; color: var(--td); padding: 2px 6px; border: 1px solid var(--br); border-radius: 10px; background: var(--s2); transition: color .1s, border-color .1s; cursor: pointer; }
    .card-tag:hover { color: var(--al); border-color: var(--ad); }

    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .filter-bar .section-label { margin-bottom: 0; }
    .active-filter { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: var(--ad); border: 1px solid var(--ac); border-radius: 20px; font-size: 11px; color: var(--al); }
    .clear-filter { background: none; border: none; color: var(--al); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

    .state-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 14px; color: var(--tm); }
    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--br); border-top-color: var(--ac); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--live); font-size: 13px; text-align: center; }

    footer { border-top: 1px solid var(--br); padding: 18px 20px; text-align: center; font-size: 11px; color: var(--td); }
    footer a { color: var(--al); text-decoration: none; }

    @media (max-width: 560px) {
      .rooms-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 9px; }
      main { padding: 14px 10px 48px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="../index.html">LiveCams</a>
    <span class="theme-tag">Crimson Velvet</span>
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    <span class="room-count" id="room-count"></span>
    <div class="header-spacer"></div>
    <a class="back-link" href="../index.html">← All Themes</a>
  </div>
</header>

<main>
  <section class="tags-section">
    <div class="section-label">Top Tags</div>
    <div class="tags-scroll" id="tags-container">
      <div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>
    </div>
  </section>
  <section class="rooms-section">
    <div class="filter-bar">
      <div class="section-label" id="rooms-label">Top Rooms</div>
      <div id="active-filter-display"></div>
    </div>
    <div id="rooms-container">
      <div class="state-container"><div class="spinner"></div><span>Loading rooms…</span></div>
    </div>
  </section>
</main>

<footer>
  All streams provided by Chaturbate. 18+ only. &nbsp;
  <a href="https://chaturbate.com/?wm=T2CSW" target="_blank" rel="noopener">Join free</a>
</footer>

<script>
  const WM='T2CSW';
  const API_URL=`https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=100&offset=0`;
  const ROOM_URL=slug=>`https://chaturbate.com/${slug}/?wm=${WM}`;
  const EMBED_URL=slug=>`https://chaturbate.com/in/?tour=OQue&bgcolor=black&campaign=${WM}&disable_sound=0&room=${slug}`;
  let allRooms=[],activeTag=null,activeEmbed=null;
  async function fetchRooms(){const r=await fetch(API_URL);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();return d.results||d.objects||(Array.isArray(d)?d:[]);}
  function buildTags(rooms){const c={};for(const r of rooms)for(const t of(r.tags||r.subject_tags||[])){const n=typeof t==='string'?t:t.name||t.tag||'';if(n)c[n]=(c[n]||0)+1;}return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,100).map(([n])=>n);}
  function renderTags(tags){const el=document.getElementById('tags-container');if(!tags.length){el.innerHTML='<span style="color:var(--td);font-size:11px;">No tags</span>';return;}el.innerHTML=tags.map(t=>`<button class="tag${activeTag===t?' active':''}" data-tag="${esc(t)}">#${esc(t)}</button>`).join('');el.querySelectorAll('.tag').forEach(b=>b.addEventListener('click',()=>{activeTag=activeTag===b.dataset.tag?null:b.dataset.tag;activeEmbed=null;renderTags(tags);renderRooms(filtered());updateFilter();}));}
  function filtered(){if(!activeTag)return allRooms;return allRooms.filter(r=>(r.tags||r.subject_tags||[]).some(t=>(typeof t==='string'?t:t.name||t.tag||'')===activeTag));}
  function updateFilter(){const el=document.getElementById('active-filter-display');const lbl=document.getElementById('rooms-label');if(activeTag){lbl.textContent='Rooms tagged';el.innerHTML=`<span class="active-filter">#${esc(activeTag)}<button class="clear-filter" title="Clear">×</button></span>`;el.querySelector('.clear-filter').addEventListener('click',()=>{activeTag=null;activeEmbed=null;renderTags(buildTags(allRooms));renderRooms(filtered());updateFilter();});}else{lbl.textContent='Top Rooms';el.innerHTML='';}}
  function renderRooms(rooms){const el=document.getElementById('rooms-container');document.getElementById('room-count').textContent=`${rooms.length} live`;if(!rooms.length){el.innerHTML='<div class="state-container"><span>No rooms for this tag.</span></div>';return;}el.innerHTML=`<div class="rooms-grid">${rooms.map((r,i)=>card(r,i+1)).join('')}</div>`;el.querySelectorAll('.thumb-wrap').forEach(w=>w.addEventListener('click',()=>toggleEmbed(w.dataset.slug)));el.querySelectorAll('.card-tag').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();activeTag=activeTag===b.dataset.tag?null:b.dataset.tag;activeEmbed=null;renderTags(buildTags(allRooms));renderRooms(filtered());updateFilter();}));}
  function toggleEmbed(slug){activeEmbed=activeEmbed===slug?null:slug;renderRooms(filtered());if(activeEmbed){const c=document.querySelector(`.room-card[data-slug="${CSS.escape(slug)}"]`);if(c)c.scrollIntoView({behavior:'smooth',block:'center'});}}
  document.addEventListener('click',e=>{const btn=e.target.closest('.close-embed');if(btn&&activeEmbed===btn.dataset.slug){activeEmbed=null;renderRooms(filtered());}});
  function card(r,rank){const slug=r.username||r.room_slug||r.slug||'';const subject=esc(r.subject||r.topic||'');const viewers=r.num_users||r.viewers||0;const img=r.current_show_images?.medium||r.image_url||r.image||r.preview_url||'';const tags=(r.tags||r.subject_tags||[]).slice(0,5).map(t=>{const n=typeof t==='string'?t:t.name||t.tag||'';return n?`<button class="card-tag" data-tag="${esc(n)}">#${esc(n)}</button>`:''}).join('');const media=activeEmbed===slug?`<div class="embed-wrap"><button class="close-embed" data-slug="${esc(slug)}" title="Close">✕</button><iframe src="${EMBED_URL(slug)}" allowfullscreen scrolling="no" allow="autoplay"></iframe></div>`:`<div class="thumb-wrap" data-slug="${esc(slug)}">${img?`<img src="${esc(img)}" alt="${esc(slug)}" loading="lazy"/>`:''}<div class="play-btn"><div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div><span class="card-rank">#${rank}</span>${viewers?`<span class="card-viewers"><span class="live-dot"></span>${fmt(viewers)}</span>`:''}</div>`;return `<div class="room-card" data-slug="${esc(slug)}">${media}<div class="card-info"><a class="card-name" href="${ROOM_URL(slug)}" target="_blank" rel="noopener noreferrer">${esc(slug)}</a>${subject?`<div class="card-subject" title="${subject}">${subject}</div>`:''}${tags?`<div class="card-tags">${tags}</div>`:''}</div></div>`;}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}
  (async function(){try{allRooms=await fetchRooms();if(!allRooms.length)throw new Error('Empty response');const tags=buildTags(allRooms);renderTags(tags);renderRooms(allRooms);}catch(err){document.getElementById('tags-container').innerHTML='';document.getElementById('rooms-container').innerHTML=`<div class="state-container"><span class="error-msg">Could not load rooms.<br>${esc(err.message)}</span><button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;background:var(--ac);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">Retry</button></div>`;document.getElementById('room-count').textContent='offline';}})();
</script>
</body>
</html>
